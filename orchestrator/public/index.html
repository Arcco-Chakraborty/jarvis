<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JARVIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #03070c;
    --bg2: #061320;
    --cyan: #4fe6ff;
    --cyan-soft: #9bf0ff;
    --cyan-dim: rgba(79, 230, 255, 0.32);
    --amber: #ffb23e;
    --red: #ff5a6e;
    --green: #4dffb0;
    --grid: rgba(79, 230, 255, 0.06);
    --text: #bfe9f5;
    --muted: #5d7f8c;
    --panel: rgba(8, 20, 30, 0.55);
    --panel-edge: rgba(79, 230, 255, 0.22);
    --display: "Rajdhani", "Segoe UI", sans-serif;
    --mono: "Share Tech Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 800px at 70% -10%, rgba(79,230,255,0.10), transparent 60%),
      radial-gradient(900px 700px at 10% 110%, rgba(255,178,62,0.06), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: var(--mono);
    overflow-x: hidden;
    letter-spacing: 0.02em;
  }
  /* atmosphere layers */
  .grid-bg, .scan, .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .grid-bg {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(circle at 50% 40%, black 30%, transparent 85%);
    animation: drift 24s linear infinite;
  }
  @keyframes drift { to { background-position: 46px 920px; } }
  .scan {
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.16) 2px 3px);
    mix-blend-mode: multiply; opacity: 0.5;
  }
  .scan::after {
    content: ""; position: absolute; left: 0; right: 0; height: 140px;
    background: linear-gradient(180deg, transparent, rgba(79,230,255,0.06), transparent);
    animation: sweep 6.5s linear infinite;
  }
  @keyframes sweep { 0% { top: -160px; } 100% { top: 100%; } }
  .vignette { box-shadow: inset 0 0 320px 40px rgba(0,0,0,0.85); }

  .wrap { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 18px clamp(14px, 3vw, 34px) 40px; }

  /* header */
  header {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    border: 1px solid var(--panel-edge); background: var(--panel);
    border-radius: 12px; padding: 12px 18px; backdrop-filter: blur(6px);
    box-shadow: 0 0 40px rgba(79,230,255,0.07), inset 0 0 30px rgba(79,230,255,0.04);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }
  .brand { font-family: var(--display); font-weight: 700; font-size: clamp(1.3rem, 3vw, 2rem);
    letter-spacing: 0.42em; color: #eafdff; text-shadow: 0 0 18px var(--cyan-dim); }
  .brand b { color: var(--cyan); }
  .tagline { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.34em; margin-top: 2px; }
  .stat-cluster { margin-left: auto; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #2a3942; box-shadow: 0 0 0 0 transparent; transition: 0.3s; }
  .dot.ok { background: var(--green); box-shadow: 0 0 10px var(--green); }
  .dot.bad { background: var(--red); box-shadow: 0 0 10px var(--red); }
  .clock { font-family: var(--display); font-weight: 600; font-size: 1.05rem; color: var(--cyan-soft); letter-spacing: 0.16em; min-width: 92px; text-align: right; text-shadow: 0 0 12px var(--cyan-dim); }

  .layout { display: grid; grid-template-columns: 1.25fr 1fr; gap: 20px; margin-top: 20px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .panel { border: 1px solid var(--panel-edge); background: var(--panel); border-radius: 12px;
    padding: 16px; backdrop-filter: blur(6px); position: relative;
    box-shadow: inset 0 0 30px rgba(79,230,255,0.04); }
  .panel::before { /* corner ticks */
    content: ""; position: absolute; inset: 6px; border: 1px solid rgba(79,230,255,0.07);
    border-radius: 8px; pointer-events: none; }
  .label { font-family: var(--display); font-weight: 600; font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.32em; color: var(--cyan); margin: 0 0 12px; display: flex; align-items: center; gap: 10px; }
  .label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--cyan-dim), transparent); }

  /* reactor stage */
  .stage { display: flex; flex-direction: column; align-items: center; }
  .reactor-box { position: relative; width: 100%; aspect-ratio: 1 / 0.82; max-height: 440px; }
  #reactor { width: 100%; height: 100%; display: block; }
  .vstatus { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
  .vstatus .word { font-family: var(--display); font-weight: 700; font-size: 1.5rem; letter-spacing: 0.3em;
    color: #eafdff; text-shadow: 0 0 22px var(--cyan); }
  .vstatus .sub { font-size: 0.64rem; letter-spacing: 0.3em; color: var(--muted); margin-top: 4px; text-transform: uppercase; }
  .transcript { min-height: 1.6em; text-align: center; margin-top: 6px; font-size: 1.05rem; color: var(--cyan-soft);
    text-shadow: 0 0 14px var(--cyan-dim); transition: 0.2s; }
  .transcript:empty::before { content: "awaiting input…"; color: var(--muted); text-shadow: none; font-size: 0.85rem; letter-spacing: 0.2em; }

  /* command line */
  .cmd { display: flex; align-items: center; gap: 10px; margin-top: 14px; width: 100%;
    border: 1px solid var(--panel-edge); border-radius: 8px; padding: 8px 12px; background: rgba(2,9,15,0.6); }
  .cmd .pr { color: var(--cyan); font-weight: 700; }
  .cmd input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font-family: var(--mono); font-size: 0.95rem; }
  .cmd input::placeholder { color: var(--muted); }
  .cmd button { background: rgba(79,230,255,0.1); border: 1px solid var(--panel-edge); color: var(--cyan);
    font-family: var(--display); font-weight: 600; letter-spacing: 0.18em; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .cmd button:hover { background: rgba(79,230,255,0.22); box-shadow: 0 0 14px var(--cyan-dim); }

  /* device nodes */
  .nodes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .node { position: relative; cursor: pointer; border: 1px solid rgba(79,230,255,0.18); border-radius: 10px;
    padding: 12px 14px; background: rgba(4,12,18,0.5); transition: 0.22s; overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
  .node:hover { border-color: var(--cyan); transform: translateY(-2px); }
  .node .nm { font-family: var(--display); font-weight: 600; text-transform: capitalize; letter-spacing: 0.06em; font-size: 1.02rem; }
  .node .st { font-size: 0.64rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .node .led { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; border-radius: 50%; background: #243239; transition: 0.25s; }
  .node.on { border-color: rgba(79,230,255,0.65); background:
      radial-gradient(120px 60px at 80% -20%, rgba(79,230,255,0.22), transparent 70%), rgba(7,22,32,0.7);
    box-shadow: 0 0 22px rgba(79,230,255,0.16), inset 0 0 18px rgba(79,230,255,0.1); }
  .node.on .st { color: var(--cyan); }
  .node.on .led { background: var(--cyan); box-shadow: 0 0 12px var(--cyan); }
  body.boardoff .nodes { opacity: 0.4; pointer-events: none; }

  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .hud-btn { font-family: var(--display); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; font-size: 0.72rem;
    color: var(--cyan); background: rgba(79,230,255,0.07); border: 1px solid var(--panel-edge); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
  .hud-btn:hover { background: rgba(79,230,255,0.2); box-shadow: 0 0 14px var(--cyan-dim); }
  .hud-btn.danger { color: var(--amber); border-color: rgba(255,178,62,0.4); background: rgba(255,178,62,0.06); }
  .hud-btn.danger:hover { background: rgba(255,178,62,0.18); box-shadow: 0 0 14px rgba(255,178,62,0.3); }

  /* wake gauge */
  .gauge { display: flex; align-items: center; gap: 12px; margin-top: 14px; font-size: 0.66rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
  .bar { position: relative; flex: 1; height: 8px; border-radius: 5px; background: rgba(2,9,15,0.8); border: 1px solid rgba(79,230,255,0.18); overflow: hidden; }
  .bar .fill { position: absolute; inset: 0; width: 0%; background: linear-gradient(90deg, var(--cyan), #eafdff); box-shadow: 0 0 12px var(--cyan); transition: width 0.12s linear; }
  .bar .thr { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .gnum { color: var(--cyan-soft); min-width: 80px; text-align: right; }

  /* console */
  .console { font-size: 0.82rem; max-height: 230px; overflow-y: auto; padding-right: 4px; }
  .console .ln { display: grid; grid-template-columns: 64px 1fr; gap: 10px; padding: 5px 0; border-bottom: 1px dashed rgba(79,230,255,0.08); }
  .console time { color: var(--muted); }
  .console .body { color: var(--text); }
  .console .cmdtxt { color: var(--cyan-soft); }
  .console .meta { color: var(--muted); }
  .console .via { color: var(--amber); }
  .console .ln.bad .body { color: var(--red); }
  .console::-webkit-scrollbar { width: 6px; }
  .console::-webkit-scrollbar-thumb { background: rgba(79,230,255,0.25); border-radius: 3px; }

  .sidestack { display: flex; flex-direction: column; gap: 20px; }

  /* boot intro */
  #boot { position: fixed; inset: 0; z-index: 50; background: var(--bg); display: grid; place-items: center;
    transition: opacity 0.8s ease; }
  #boot.done { opacity: 0; pointer-events: none; }
  #boot .bt { font-family: var(--display); font-weight: 700; font-size: clamp(2rem, 9vw, 5rem); letter-spacing: 0.5em;
    color: #eafdff; text-shadow: 0 0 30px var(--cyan); }
  #boot .bl { margin-top: 18px; font-size: 0.78rem; letter-spacing: 0.3em; color: var(--cyan); min-height: 1.4em; }
  .reduced #reactor { opacity: 0.85; }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scan"></div>
  <div class="vignette"></div>

  <div id="boot"><div style="text-align:center"><div class="bt">JARVIS</div><div class="bl" id="bootline">INITIALIZING CORE…</div></div></div>

  <div class="wrap">
    <header>
      <div>
        <div class="brand">J<b>.</b>A<b>.</b>R<b>.</b>V<b>.</b>I<b>.</b>S</div>
        <div class="tagline">Just A Rather Very Intelligent System</div>
      </div>
      <div class="stat-cluster">
        <div class="stat"><span id="dot-orch" class="dot"></span>core</div>
        <div class="stat"><span id="dot-board" class="dot"></span>switch</div>
        <div class="stat"><span id="dot-voice" class="dot"></span>voice</div>
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <div class="layout">
      <!-- reactor stage -->
      <section class="panel stage">
        <div class="label">Voice Core</div>
        <div class="reactor-box">
          <canvas id="reactor"></canvas>
          <div class="vstatus"><div class="word" id="vword">IDLE</div><div class="sub" id="vsub">standby</div></div>
        </div>
        <div class="transcript" id="transcript"></div>
        <div class="gauge">
          wake
          <div class="bar"><div class="fill" id="wfill"></div><div class="thr" id="wthr"></div></div>
          <span class="gnum" id="wnum">0.00</span>
        </div>
        <form class="cmd" onsubmit="return runCmd(event)">
          <span class="pr">&gt;</span>
          <input id="cmd" placeholder="type a command…  e.g. turn off the tubelight" autocomplete="off" />
          <button type="submit">SEND</button>
        </form>
      </section>

      <!-- side stack -->
      <div class="sidestack">
        <section class="panel">
          <div class="label">Devices</div>
          <div id="nodes" class="nodes"></div>
          <div class="controls">
            <button class="hud-btn" onclick="sw('lights','on')">Lights On</button>
            <button class="hud-btn" onclick="sw('lights','off')">Lights Off</button>
            <button class="hud-btn" onclick="sw('fans','on')">Fans On</button>
            <button class="hud-btn" onclick="sw('fans','off')">Fans Off</button>
            <button class="hud-btn danger" onclick="allOff()">All Off</button>
          </div>
        </section>

        <section class="panel">
          <div class="label">Activity Console</div>
          <div id="feed" class="console"></div>
        </section>
      </div>
    </div>
  </div>

<script>
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp01 = (x) => Math.max(0, Math.min(1, x));
  const setDot = (id, ok) => { const e = $(id); if (e) e.className = "dot " + (ok ? "ok" : "bad"); };

  /* ---------- actions (preserved behaviors) ---------- */
  async function post(path, body) {
    try {
      const r = await fetch(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
      const j = await r.json().catch(() => ({}));
      if (j && j.speak) flashTranscript("▸ " + j.speak);
    } catch (_) { flashTranscript("▸ (request failed)"); }
    pollState(); pollLog();
  }
  const sw = (target, action) => post("/switch", { target, action });
  const allOff = () => post("/switch", { action: "all_off" });
  function runCmd(e) { e.preventDefault(); const t = $("cmd").value.trim(); if (t) post("/command", { text: t }); $("cmd").value = ""; return false; }
  window.sw = sw; window.allOff = allOff; window.runCmd = runCmd;

  let flashUntil = 0;
  function flashTranscript(txt) { $("transcript").textContent = txt; flashUntil = Date.now() + 4000; }

  /* ---------- /state : device nodes ---------- */
  async function pollState() {
    try {
      const s = await (await fetch("/state")).json();
      setDot("dot-orch", true);
      setDot("dot-board", !!s.online);
      document.body.classList.toggle("boardoff", !s.online);
      renderNodes(s.smartswitch || {});
    } catch (_) { setDot("dot-orch", false); }
  }
  function renderNodes(sm) {
    const host = $("nodes");
    const entries = Object.entries(sm);
    if (host.children.length !== entries.length) host.innerHTML = "";
    entries.forEach(([name, on], i) => {
      let node = host.children[i];
      if (!node) {
        node = document.createElement("div");
        node.innerHTML = '<span class="led"></span><div class="nm"></div><div class="st"></div>';
        host.appendChild(node);
      }
      node.className = "node" + (on ? " on" : "");
      node.querySelector(".nm").textContent = name;
      node.querySelector(".st").textContent = on ? "energized" : "offline";
      node.onclick = () => sw(name, on ? "off" : "on");
    });
  }

  /* ---------- /voice : drives the reactor ---------- */
  const voice = { status: "idle", score: 0, threshold: 0.5, transcript: "", online: false };
  async function pollVoice() {
    try {
      const v = await (await fetch("/voice")).json();
      voice.status = v.status || "idle";
      voice.score = Number(v.wakeScore || 0);
      voice.threshold = Number(v.threshold || 0.5);
      voice.transcript = v.lastTranscript || "";
      voice.online = v.ageMs != null && v.ageMs < 3000;
      setDot("dot-voice", voice.online);
      $("wfill").style.width = clamp01(voice.score) * 100 + "%";
      $("wthr").style.left = clamp01(voice.threshold) * 100 + "%";
      $("wnum").textContent = voice.score.toFixed(2) + " / " + voice.threshold.toFixed(2);
      const labels = { idle: ["IDLE", "standby"], listening: ["LISTENING", "say “hey jarvis”"],
        awake: ["AWAKE", "go ahead"], recording: ["LISTENING", "capturing…"], transcribing: ["THINKING", "decoding…"] };
      const [w, sub] = labels[voice.status] || ["IDLE", "standby"];
      $("vword").textContent = w; $("vsub").textContent = sub;
      if (Date.now() > flashUntil) $("transcript").textContent = voice.transcript ? '“' + voice.transcript + '”' : "";
    } catch (_) { setDot("dot-voice", false); }
  }

  /* ---------- /log : activity console ---------- */
  function intentText(it) { if (!it) return "—"; if (it.action === "all_off") return "all off"; return it.action + (it.target ? " " + it.target : ""); }
  async function pollLog() {
    try {
      const { commands = [] } = await (await fetch("/log")).json();
      const feed = $("feed"); feed.innerHTML = "";
      for (const c of commands) {
        const ln = document.createElement("div");
        ln.className = "ln" + (c.ok ? "" : " bad");
        const t = document.createElement("time"); t.textContent = new Date(c.ts).toLocaleTimeString();
        const b = document.createElement("div"); b.className = "body";
        const cmd = document.createElement("span"); cmd.className = "cmdtxt"; cmd.textContent = '"' + (c.text || "") + '" ';
        const meta = document.createElement("span"); meta.className = "meta";
        meta.textContent = intentText(c.intent) + (c.via ? " " : "");
        const via = document.createElement("span"); via.className = "via"; via.textContent = c.via ? "[" + c.via + "]" : "";
        b.append(cmd, meta, via);
        if (c.speak) { const sp = document.createElement("span"); sp.className = "meta"; sp.textContent = "  → " + c.speak; b.append(sp); }
        ln.append(t, b); feed.appendChild(ln);
      }
    } catch (_) {}
  }

  /* ---------- clock ---------- */
  function tickClock() { $("clock").textContent = new Date().toLocaleTimeString([], { hour12: false }); }

  /* ---------- reactor canvas ---------- */
  const cvs = $("reactor"), ctx = cvs.getContext("2d");
  let W = 0, H = 0, DPR = 1, cx = 0, cy = 0, R = 0;
  function resize() {
    const r = cvs.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.max(1, Math.floor(r.width)); H = Math.max(1, Math.floor(r.height));
    cvs.width = W * DPR; cvs.height = H * DPR; ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2; cy = H / 2; R = Math.min(W, H) * 0.34;
  }
  window.addEventListener("resize", resize);

  // unit-sphere geometry (computed once): an even point cloud + lat/long wireframe
  function fibSphere(n) {
    const pts = [], ga = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2, r = Math.sqrt(Math.max(0, 1 - y * y)), t = ga * i;
      pts.push({ x: Math.cos(t) * r, y, z: Math.sin(t) * r });
    }
    return pts;
  }
  function parallel(latDeg, seg) {
    const lat = latDeg * Math.PI / 180, y = Math.sin(lat), r = Math.cos(lat), loop = [];
    for (let i = 0; i <= seg; i++) { const a = i / seg * Math.PI * 2; loop.push({ x: Math.cos(a) * r, y, z: Math.sin(a) * r }); }
    return loop;
  }
  function meridian(lonDeg, seg) {
    const lon = lonDeg * Math.PI / 180, loop = [];
    for (let i = 0; i <= seg; i++) { const a = i / seg * Math.PI * 2, r = Math.cos(a); loop.push({ x: r * Math.cos(lon), y: Math.sin(a), z: r * Math.sin(lon) }); }
    return loop;
  }
  const DOTS = fibSphere(340);
  const RINGS = [parallel(0, 84), parallel(30, 76), parallel(-30, 76), parallel(60, 60), parallel(-60, 60),
                 meridian(0, 84), meridian(45, 84), meridian(90, 84), meridian(135, 84)];
  const TILT = 0.42, cosT = Math.cos(TILT), sinT = Math.sin(TILT);

  const ripples = [];
  let lvl = 0, intensity = 0.2, rot = 0, lastRipple = 0;
  let hidden = false;
  document.addEventListener("visibilitychange", () => { hidden = document.hidden; if (!hidden) { last = performance.now(); requestAnimationFrame(frame); } });

  function targets() {
    const active = voice.status !== "idle" && voice.online;
    const baseInt = { idle: 0.18, listening: 0.5, awake: 1, recording: 1, transcribing: 0.8 }[voice.status] ?? 0.18;
    const targetInt = voice.online ? baseInt : 0.12;
    // smooth level: breathing baseline + wake score when active
    const breath = 0.5 + 0.5 * Math.sin(performance.now() / 1400);
    const targetLvl = active ? Math.max(clamp01(voice.score) * 1.1, 0.12 * breath) + (voice.status === "awake" || voice.status === "recording" ? 0.25 : 0)
                             : 0.10 * breath;
    intensity += (targetInt - intensity) * 0.06;
    lvl += (clamp01(targetLvl) - lvl) * 0.18;
  }

  // rotate a unit point by yaw, then a fixed tilt -> unit-space {x,y,z}; z is depth (-1 far .. 1 near)
  function rotPt(p, cyaw, syaw) {
    const x = p.x * cyaw + p.z * syaw, z = -p.x * syaw + p.z * cyaw, y = p.y;
    return { x, y: y * cosT - z * sinT, z: y * sinT + z * cosT };
  }

  let last = performance.now();
  function frame(now) {
    if (hidden) return;
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    targets();
    rot += dt * (0.16 + intensity * 0.7);

    ctx.clearRect(0, 0, W, H);
    const hot = (voice.status === "awake" || voice.status === "recording") ? 1 : 0;
    const cyan = `rgba(79,230,255,`, white = `rgba(234,253,255,`, amber = `rgba(255,178,62,`;
    const accent = hot ? amber : cyan;
    const Rs = R * 0.86;
    const cyaw = Math.cos(rot), syaw = Math.sin(rot);

    // outer rotating arc rings
    ctx.lineCap = "round";
    for (let k = 0; k < 2; k++) {
      const rr = R * (1.16 + k * 0.17), segs = 3 + k;
      ctx.lineWidth = 2; ctx.strokeStyle = cyan + (0.10 + 0.10 * intensity) + ")";
      ctx.shadowBlur = 12; ctx.shadowColor = cyan + "0.5)";
      for (let s = 0; s < segs; s++) {
        const a0 = rot * (k % 2 ? -1 : 1) * 0.6 + (s / segs) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(cx, cy, rr, a0, a0 + (Math.PI * 2 / segs) * 0.6); ctx.stroke();
      }
    }
    // tick ring
    ctx.shadowBlur = 0;
    const ticks = 72;
    for (let i = 0; i < ticks; i++) {
      const a = (i / ticks) * Math.PI * 2, big = i % 6 === 0;
      const r1 = R * 1.04, r2 = R * (big ? 1.10 : 1.07);
      ctx.strokeStyle = cyan + (big ? 0.30 : 0.12) + ")"; ctx.lineWidth = big ? 1.5 : 1;
      ctx.beginPath(); ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1); ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2); ctx.stroke();
    }

    // glow core behind the sphere
    const glowR = Rs * (1.05 + 0.12 * lvl);
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    g.addColorStop(0, accent + (0.16 + 0.24 * lvl) + ")");
    g.addColorStop(0.5, cyan + (0.05 + 0.08 * lvl) + ")");
    g.addColorStop(1, cyan + "0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI * 2); ctx.fill();

    // latitude / longitude wireframe (depth-shaded: far segments dimmer)
    ctx.lineWidth = 1;
    for (const loop of RINGS) {
      for (let i = 0; i < loop.length - 1; i++) {
        const A = rotPt(loop[i], cyaw, syaw), B = rotPt(loop[i + 1], cyaw, syaw);
        const z = (A.z + B.z) / 2, al = (0.05 + 0.22 * ((z + 1) / 2)) * (0.7 + 0.5 * intensity);
        ctx.strokeStyle = accent + al.toFixed(3) + ")";
        ctx.beginPath(); ctx.moveTo(cx + A.x * Rs, cy + A.y * Rs); ctx.lineTo(cx + B.x * Rs, cy + B.y * Rs); ctx.stroke();
      }
    }

    // dots: project, sort back-to-front, draw with depth + a brightness wave sweeping the globe
    const proj = [];
    for (let i = 0; i < DOTS.length; i++) {
      const P = rotPt(DOTS[i], cyaw, syaw);
      proj.push({ x: cx + P.x * Rs, y: cy + P.y * Rs, z: P.z, sx: DOTS[i].x, sy: DOTS[i].y });
    }
    proj.sort((a, b) => a.z - b.z);
    for (const d of proj) {
      const depth = (d.z + 1) / 2;                                   // 0 far .. 1 near
      const wv = 0.5 + 0.5 * Math.sin(d.sy * 5 + now / 520 + d.sx * 2.5);
      const size = (0.5 + 1.7 * depth) * (1 + 0.35 * lvl);
      const crest = wv > 0.82 && depth > 0.55;
      const al = clamp01((0.12 + 0.62 * depth) * (0.55 + 0.45 * wv) + 0.25 * lvl * depth);
      ctx.fillStyle = (crest ? white : accent) + al.toFixed(3) + ")";
      ctx.beginPath(); ctx.arc(d.x, d.y, size, 0, Math.PI * 2); ctx.fill();
    }

    // silhouette rim
    ctx.beginPath(); ctx.arc(cx, cy, Rs, 0, Math.PI * 2);
    ctx.strokeStyle = cyan + (0.12 + 0.18 * intensity) + ")"; ctx.lineWidth = 1.4;
    ctx.shadowBlur = 16; ctx.shadowColor = accent + "0.5)"; ctx.stroke(); ctx.shadowBlur = 0;

    // central bright pip
    const pipR = R * (0.05 + 0.03 * lvl + 0.012 * Math.sin(now / 300)) * 3;
    const pg = ctx.createRadialGradient(cx, cy, 0, cx, cy, pipR);
    pg.addColorStop(0, white + "0.9)"); pg.addColorStop(0.5, accent + "0.45)"); pg.addColorStop(1, cyan + "0)");
    ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(cx, cy, pipR, 0, Math.PI * 2); ctx.fill();

    // radar-ping ripples when active
    if (hot && now - lastRipple > 620 - intensity * 220) { ripples.push({ r: Rs, a: 0.45 }); lastRipple = now; }
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i]; rp.r += dt * 130; rp.a -= dt * 0.45;
      if (rp.a <= 0) { ripples.splice(i, 1); continue; }
      ctx.beginPath(); ctx.arc(cx, cy, rp.r, 0, Math.PI * 2);
      ctx.strokeStyle = accent + rp.a.toFixed(3) + ")"; ctx.lineWidth = 1.4; ctx.stroke();
    }

    requestAnimationFrame(frame);
  }

  /* ---------- boot intro ---------- */
  function boot() {
    const lines = ["INITIALIZING CORE…", "LINKING SMART SWITCH…", "ARMING VOICE PIPELINE…", "SYSTEMS ONLINE"];
    let i = 0; const el = $("bootline");
    const iv = setInterval(() => { i++; if (i < lines.length) el.textContent = lines[i]; }, 420);
    setTimeout(() => { clearInterval(iv); $("boot").classList.add("done"); }, 1900);
  }

  /* ---------- start ---------- */
  resize(); boot();
  tickClock(); setInterval(tickClock, 1000);
  pollState(); setInterval(pollState, 1500);
  pollVoice(); setInterval(pollVoice, 500);
  pollLog(); setInterval(pollLog, 1500);
  requestAnimationFrame(frame);
</script>
</body>
</html>
